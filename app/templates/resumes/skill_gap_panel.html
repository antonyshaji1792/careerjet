<!-- Skill Gap Analysis Panel Component -->
<style>
    .skill-gap-panel {
        position: sticky;
        top: 20px;
        max-height: calc(100vh - 40px);
        overflow-y: auto;
    }

    .skill-gap-summary {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border-radius: 16px;
        padding: 24px;
        margin-bottom: 20px;
    }

    .score-circle {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.2);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        margin: 0 auto 16px;
        border: 4px solid rgba(255, 255, 255, 0.3);
    }

    .score-number {
        font-size: 36px;
        font-weight: 700;
        line-height: 1;
    }

    .score-label {
        font-size: 12px;
        opacity: 0.9;
        margin-top: 4px;
    }

    .skill-item {
        transition: all 0.3s ease;
        border-left: 4px solid transparent;
    }

    .skill-item:hover {
        background: #f8f9fa;
        border-left-color: #667eea;
        transform: translateX(4px);
    }

    .impact-badge {
        font-size: 11px;
        padding: 4px 10px;
        border-radius: 12px;
        font-weight: 600;
    }

    .impact-critical {
        background: #fee;
        color: #c00;
    }

    .impact-high {
        background: #fef3cd;
        color: #856404;
    }

    .impact-medium {
        background: #d1ecf1;
        color: #0c5460;
    }

    .impact-low {
        background: #d4edda;
        color: #155724;
    }

    .add-skill-btn {
        padding: 6px 16px;
        font-size: 13px;
        border-radius: 20px;
        transition: all 0.2s;
    }

    .add-skill-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
    }

    .skill-gap-loading {
        text-align: center;
        padding: 40px;
    }

    .pulse-animation {
        animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {

        0%,
        100% {
            opacity: 1;
        }

        50% {
            opacity: 0.5;
        }
    }

    .matched-skill {
        opacity: 0.7;
    }

    .matched-skill .skill-name {
        text-decoration: line-through;
    }

    .top-skill-badge {
        font-size: 20px;
        margin-right: 8px;
    }

    .improvement-bar {
        height: 8px;
        background: #e9ecef;
        border-radius: 4px;
        overflow: hidden;
        margin-top: 8px;
    }

    .improvement-fill {
        height: 100%;
        background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
        transition: width 0.5s ease;
    }
</style>

<div id="skillGapPanel" class="skill-gap-panel d-none">
    <!-- Summary Card -->
    <div class="card border-0 shadow-sm rounded-4 mb-3">
        <div class="skill-gap-summary">
            <h5 class="fw-bold mb-3 text-center">ATS Score</h5>
            <div class="score-circle">
                <div class="score-number" id="atsScore">--</div>
                <div class="score-label">/ 100</div>
            </div>
            <div class="text-center">
                <div class="mb-2">
                    <small class="opacity-75">Match Percentage</small>
                    <div class="fw-bold" id="matchPercentage">--%</div>
                </div>
                <div class="improvement-bar">
                    <div class="improvement-fill" id="improvementBar" style="width: 0%"></div>
                </div>
                <small class="opacity-75 mt-2 d-block">
                    Potential: <span id="potentialScore" class="fw-bold">--</span>/100
                </small>
            </div>
        </div>
    </div>

    <!-- Top 3 Skills to Add -->
    <div class="card border-0 shadow-sm rounded-4 mb-3">
        <div class="card-body p-3">
            <h6 class="fw-bold mb-3">
                <i class="fas fa-star text-warning me-2"></i>
                Top Skills to Add
            </h6>
            <div id="topSkillsList">
                <div class="skill-gap-loading">
                    <div class="spinner-border spinner-border-sm text-primary pulse-animation" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <p class="small text-muted mt-2 mb-0">Analyzing gaps...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Missing Skills List -->
    <div class="card border-0 shadow-sm rounded-4">
        <div class="card-body p-3">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h6 class="fw-bold mb-0">
                    <i class="fas fa-list-check me-2"></i>
                    Skill Gaps
                </h6>
                <span class="badge bg-danger-soft text-danger rounded-pill" id="gapCount">0</span>
            </div>

            <!-- Filter Tabs -->
            <ul class="nav nav-pills nav-fill mb-3" id="gapFilterTabs">
                <li class="nav-item">
                    <a class="nav-link active small" data-filter="all" href="#"
                        onclick="filterGaps('all'); return false;">
                        All
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link small" data-filter="mandatory" href="#"
                        onclick="filterGaps('mandatory'); return false;">
                        Mandatory
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link small" data-filter="preferred" href="#"
                        onclick="filterGaps('preferred'); return false;">
                        Preferred
                    </a>
                </li>
            </ul>

            <div id="missingSkillsList">
                <div class="skill-gap-loading">
                    <div class="spinner-border spinner-border-sm text-primary pulse-animation" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <p class="small text-muted mt-2 mb-0">Analyzing gaps...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Matched Skills (Collapsible) -->
    <div class="card border-0 shadow-sm rounded-4 mt-3">
        <div class="card-body p-3">
            <div class="d-flex justify-content-between align-items-center">
                <h6 class="fw-bold mb-0">
                    <i class="fas fa-check-circle text-success me-2"></i>
                    Matched Skills
                </h6>
                <button class="btn btn-sm btn-link text-decoration-none" data-bs-toggle="collapse"
                    data-bs-target="#matchedSkillsCollapse">
                    <i class="fas fa-chevron-down"></i>
                </button>
            </div>
            <div class="collapse mt-3" id="matchedSkillsCollapse">
                <div id="matchedSkillsList">
                    <p class="small text-muted text-center py-2">No matched skills yet</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Skill Gap Analysis UI Logic
    let currentAnalysis = null;
    let currentResumeId = null;
    let currentJobId = null;

    // Analyze skill gaps for a resume
    async function analyzeSkillGaps(resumeId, jobDescription) {
        try {
            currentResumeId = resumeId;

            // Show panel
            document.getElementById('skillGapPanel').classList.remove('d-none');

            // Show loading state
            showGapLoadingState();

            // Call API
            const response = await fetch(`/api/skill-gap-ui/analyze/${resumeId}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    job_description: jobDescription
                })
            });

            if (!response.ok) {
                throw new Error('Analysis failed');
            }

            const data = await response.json();
            currentAnalysis = data.analysis;
            currentJobId = data.job_id;

            // Update UI
            updateGapSummary(data.analysis);
            updateTopSkills(data.top_skills_to_add);
            updateMissingSkills(data.analysis.gaps);
            updateMatchedSkills(data.analysis.matched_skills);

        } catch (error) {
            console.error('Skill gap analysis failed:', error);
            showGapError(error.message);
        }
    }

    // Update summary section
    function updateGapSummary(analysis) {
        const summary = analysis.summary;

        // Update scores
        document.getElementById('atsScore').textContent = Math.round(summary.current_ats_score);
        document.getElementById('matchPercentage').textContent = Math.round(summary.match_percentage) + '%';
        document.getElementById('potentialScore').textContent = Math.round(summary.potential_ats_score);

        // Update improvement bar
        const improvementPercentage = (summary.current_ats_score / summary.potential_ats_score) * 100;
        document.getElementById('improvementBar').style.width = improvementPercentage + '%';

        // Update gap count
        const totalGaps = summary.missing_mandatory + summary.missing_preferred + summary.missing_nice_to_have;
        document.getElementById('gapCount').textContent = totalGaps;
    }

    // Update top 3 skills
    function updateTopSkills(topSkills) {
        const container = document.getElementById('topSkillsList');

        if (!topSkills || topSkills.length === 0) {
            container.innerHTML = '<p class="small text-muted text-center py-2">No skill gaps found</p>';
            return;
        }

        let html = '';
        topSkills.forEach((skill, index) => {
            const badge = index === 0 ? '🥇' : index === 1 ? '🥈' : '🥉';
            const impactClass = getImpactClass(skill.impact_level);

            html += `
            <div class="skill-item p-3 mb-2 border rounded-3">
                <div class="d-flex justify-content-between align-items-start mb-2">
                    <div class="flex-grow-1">
                        <span class="top-skill-badge">${badge}</span>
                        <strong class="skill-name">${skill.skill_name}</strong>
                        <span class="impact-badge ${impactClass} ms-2">+${skill.score_delta.toFixed(1)} pts</span>
                    </div>
                </div>
                <div class="small text-muted mb-2">
                    <i class="fas fa-clock me-1"></i>${skill.learning_time} weeks
                    <span class="ms-2"><i class="fas fa-chart-line me-1"></i>ROI: ${skill.roi_score.toFixed(1)}</span>
                </div>
                <button class="btn btn-primary-gradient add-skill-btn btn-sm w-100" 
                        onclick="addSkillToResume('${skill.skill_name}', '${skill.skill_key}')">
                    <i class="fas fa-plus me-1"></i>Add to Resume
                </button>
            </div>
        `;
        });

        container.innerHTML = html;
    }

    // Update missing skills list
    function updateMissingSkills(gaps) {
        const container = document.getElementById('missingSkillsList');

        const allGaps = [
            ...gaps.missing_mandatory.map(s => ({ ...s, type: 'mandatory' })),
            ...gaps.missing_preferred.map(s => ({ ...s, type: 'preferred' })),
            ...gaps.missing_nice_to_have.map(s => ({ ...s, type: 'nice_to_have' }))
        ];

        if (allGaps.length === 0) {
            container.innerHTML = '<p class="small text-muted text-center py-2">No gaps found! 🎉</p>';
            return;
        }

        let html = '';
        allGaps.forEach(skill => {
            const impactClass = getImpactClass(skill.severity);

            html += `
            <div class="skill-item p-2 mb-2 border-bottom gap-item" data-type="${skill.type}">
                <div class="d-flex justify-content-between align-items-center">
                    <div class="flex-grow-1">
                        <div class="skill-name fw-semibold">${skill.skill_name}</div>
                        <small class="text-muted">${skill.requirement_type || skill.type}</small>
                    </div>
                    <div class="text-end">
                        <span class="impact-badge ${impactClass}">${skill.severity}</span>
                        <button class="btn btn-sm btn-outline-primary add-skill-btn ms-2" 
                                onclick="addSkillToResume('${skill.skill_name}', '${skill.skill_key}')">
                            <i class="fas fa-plus"></i>
                        </button>
                    </div>
                </div>
            </div>
        `;
        });

        container.innerHTML = html;
    }

    // Update matched skills
    function updateMatchedSkills(matchedSkills) {
        const container = document.getElementById('matchedSkillsList');

        if (!matchedSkills || matchedSkills.length === 0) {
            container.innerHTML = '<p class="small text-muted text-center py-2">No matched skills yet</p>';
            return;
        }

        let html = '';
        matchedSkills.forEach(skill => {
            html += `
            <div class="matched-skill p-2 mb-1 border-bottom">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <i class="fas fa-check-circle text-success me-2"></i>
                        <span class="skill-name">${skill.skill_name}</span>
                    </div>
                    <small class="text-muted">${skill.proficiency || 'matched'}</small>
                </div>
            </div>
        `;
        });

        container.innerHTML = html;
    }

    // Add skill to resume
    async function addSkillToResume(skillName, skillKey) {
        try {
            if (!currentResumeId) {
                alert('Please select a resume first');
                return;
            }

            // Show loading
            event.target.disabled = true;
            event.target.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Adding...';

            // Call API
            const response = await fetch(`/api/skill-gap-ui/add-skill-to-resume/${currentResumeId}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    skill_name: skillName,
                    skill_key: skillKey,
                    proficiency: 'intermediate'
                })
            });

            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error || 'Failed to add skill');
            }

            const data = await response.json();

            // Show success
            event.target.innerHTML = '<i class="fas fa-check"></i> Added!';
            event.target.classList.remove('btn-primary-gradient', 'btn-outline-primary');
            event.target.classList.add('btn-success');

            // Show toast notification
            showToast('Success', `Added ${skillName} to your resume!`, 'success');

            // Refresh analysis after 1 second
            setTimeout(() => {
                if (currentJobId) {
                    // Re-analyze with current job
                    analyzeSkillGaps(currentResumeId, '');
                }
            }, 1000);

        } catch (error) {
            console.error('Add skill failed:', error);
            event.target.disabled = false;
            event.target.innerHTML = '<i class="fas fa-plus"></i> Add';
            alert('Failed to add skill: ' + error.message);
        }
    }

    // Filter gaps by type
    function filterGaps(type) {
        // Update active tab
        document.querySelectorAll('#gapFilterTabs .nav-link').forEach(link => {
            link.classList.remove('active');
        });
        event.target.classList.add('active');

        // Filter items
        document.querySelectorAll('.gap-item').forEach(item => {
            if (type === 'all' || item.dataset.type === type) {
                item.style.display = 'block';
            } else {
                item.style.display = 'none';
            }
        });
    }

    // Helper functions
    function getImpactClass(severity) {
        const map = {
            'critical': 'impact-critical',
            'high': 'impact-high',
            'medium': 'impact-medium',
            'low': 'impact-low'
        };
        return map[severity] || 'impact-medium';
    }

    function showGapLoadingState() {
        document.getElementById('atsScore').textContent = '--';
        document.getElementById('matchPercentage').textContent = '--%';
        document.getElementById('potentialScore').textContent = '--';
        document.getElementById('improvementBar').style.width = '0%';
    }

    function showGapError(message) {
        document.getElementById('topSkillsList').innerHTML = `
        <div class="alert alert-danger small mb-0">
            <i class="fas fa-exclamation-triangle me-2"></i>${message}
        </div>
    `;
    }

    function showToast(title, message, type = 'info') {
        // Simple toast notification (you can enhance this)
        const toast = document.createElement('div');
        toast.className = `alert alert-${type} position-fixed top-0 end-0 m-3`;
        toast.style.zIndex = '9999';
        toast.innerHTML = `<strong>${title}</strong><br>${message}`;
        document.body.appendChild(toast);

        setTimeout(() => {
            toast.remove();
        }, 3000);
    }
</script>
