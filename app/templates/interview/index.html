{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-sm border-0">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <div class="display-4 text-primary mb-3">
                        <i class="fas fa-user-tie"></i>
                    </div>
                    <h2 class="fw-bold">AI Interview Assistant</h2>
                    <p class="text-muted">Practice with a personalized AI interviewer tailored to your target role.</p>
                </div>

                <form action="{{ url_for('interview.setup_session') }}" method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    
                    <div class="mb-3">
                        <label for="job_title" class="form-label fw-bold">Job Title *</label>
                        <input type="text" class="form-control form-control-lg" id="job_title" name="job_title" placeholder="e.g. Senior Product Manager" required>
                    </div>

                    <div class="mb-3">
                        <label for="company" class="form-label fw-bold">Target Company (Optional)</label>
                        <input type="text" class="form-control" id="company" name="company" placeholder="e.g. Google, Startup Inc.">
                        <div class="form-text">Refines questions based on company culture.</div>
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label fw-bold">Job Description (Optional)</label>
                        <textarea class="form-control" id="description" name="description" rows="3" placeholder="Paste key responsibilities or requirements..."></textarea>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Difficulty Level</label>
                        <div class="d-flex gap-2">
                            <input type="radio" class="btn-check" name="difficulty" id="diff_easy" value="easy" autocomplete="off">
                            <label class="btn btn-outline-success flex-grow-1" for="diff_easy">Easy</label>

                            <input type="radio" class="btn-check" name="difficulty" id="diff_medium" value="medium" autocomplete="off" checked>
                            <label class="btn btn-outline-warning flex-grow-1" for="diff_medium">Medium</label>

                            <input type="radio" class="btn-check" name="difficulty" id="diff_hard" value="hard" autocomplete="off">
                            <label class="btn btn-outline-danger flex-grow-1" for="diff_hard">Hard</label>
                        </div>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="fas fa-play me-2"></i> Start Interview
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
